// Bhop Timer Core
bhop_timer_enabled "1"

// Economy, credits, market, and badges
bhop_economy_enabled "1"
bhop_market_enabled "1"
bhop_hook_reward_credits "1000"
bhop_hook_reward_speed "2000.0"

// HUD
bhop_timer_hud "1"
bhop_timer_hud_update "0.1"

// Zone rendering
bhop_zone_render "1"
bhop_zone_render_interval "0.8"
bhop_zone_start_color "0 255 0"
bhop_zone_finish_color "255 0 0"
bhop_zone_z_padding "72.0"
bhop_zone_floor_offset "-36.0"
bhop_zone_render_z_offset "1.0"
bhop_zone_snap_to_floor "1"

// Records
bhop_records_enabled "1"
bhop_records_pro_limit "15"

// Remote MySQL/MariaDB storage
// SQLx accepts a custom port in host:port format.
// Keep this disabled in public packages. Put real credentials in
// addons/amxmodx/configs/bhop_timer_private.cfg on your own server.
bhop_sql_enabled "0"
bhop_sql_host "127.0.0.1:3306"
bhop_sql_user "bhop_user"
bhop_sql_pass "change_me"
bhop_sql_db "bhop_timer"
bhop_sql_timeout "5"

// Admin
// Default "l" is ADMIN_RCON in AMX Mod X.
bhop_zone_admin_flag "l"
bhop_chat_prefix "[TIMER]"
bhop_admin_glow "1"
bhop_admin_glow_color "180 180 180"
bhop_admin_glow_amount "18"

// Rotating chat advertisements. Empty messages are skipped.
// The interval is clamped to at least 30 seconds.
bhop_ads_enabled "1"
bhop_ads_interval "120"
bhop_ad_text_1 "Follow the current leaderboard with /pro15."
bhop_ad_text_2 "Type /pro15 for top 15 records, /replay to watch the world record."
bhop_ad_text_3 "Switch modes with /mode - Normal FPS, Low Gravity, Double Jump."
bhop_ad_text_4 "Spend your credits in /market or /shop, check with /credits."
bhop_ad_text_5 "Your profile is created automatically; earn credits, badges and prefixes."
bhop_ad_text_6 "Challenge someone with /duel, accept with /accept and race!"
bhop_ad_text_7 "Adjust FPS and visibility with /fps, check status with /bhopstatus."
bhop_ad_text_8 "Use /menu to reach every BMOD feature."
bhop_ad_text_9 "Vote for the next map with /rtv, nominate with /nominate."
bhop_ad_text_10 "Teleport to start with /start or /respawn, reset with /reset."
bhop_ad_text_11 "Type /knifes to choose your knife skin."

// Gameplay
bhop_reset_on_death "1"
bhop_reset_on_teamchange "1"
bhop_count_admin_noclip "0"
bhop_start_teleport_z_offset "40.0"
bhop_teleport_on_finish "1"
bhop_auto_ct "1"
bhop_start_menu_on_join "1"
bhop_godmode "1"
bhop_block_server_commands "1"
bhop_block_weapon_pickup "1"
bhop_auto_bhop "1"
bhop_speedometer "1"
bhop_spectator_hud_enabled "1"
bhop_spectator_hud_interval "1.0"
// Normal mode has fixed record categories: 131, 200, 333, 500, 1000 FPS.
// Exceeding a Normal category reapplies fps_max only; it does not teleport.
bhop_normal_fps_enforce "1"
bhop_normal_fps_limit "0"
bhop_normal_fps_max "131"
bhop_normal_fps_warn_tolerance "30"
bhop_other_modes_fps_max "1000"

// Server-wide ranked Simple Mode. It has its own WR/PB/replay category and
// does not force or verify a client FPS value.
bhop_simple_enabled "1"
bhop_simple_doublejump "1"
bhop_simple_lowgravity "0"

bhop_player_maxspeed "40000"
bhop_startzone_maxspeed "300"
bhop_normal_maxspeed "2000"
bhop_other_modes_maxspeed "3000"
bhop_remove_jump_slowdown "1"
bhop_replay_pitch_invert "0"

// Hook and parachute
// Hook is bound by players with commands like: bind c +hook
// Using hook resets/aborts the active timer run.
bhop_hook_enabled "1"
bhop_hook_speed "900.0"
bhop_hook_max_distance "2000.0"
bhop_hook_min_distance "64.0"
bhop_parachute_enabled "1"
bhop_parachute_fall_speed "120.0"

// Keybind suggestions (players enter these in their own console)
// bind c +hook
// bind m "say /menu"
// bind f "say /fps"
// bind b "say /market"
// bind n "say /mod"
// bind j "say /duel"
// bind p "say /credits"

// Ramp/surf helpers are integrated into bhop_timer.amxx.
bhop_surf_fix "1"
bhop_surf_fix_min_speed "180.0"
bhop_surf_fix_restore_velocity "0"
bhop_surf_fix_unstuck_height "0.01"
bhop_surf_fix_trace_height "2.0"
bhop_waterjump_fix "1"
bhop_edgebug_fix "0"
bhop_keep_teleport_velocity "0"

// MOTD Web Integration
// When enabled (1), /pro15 and /top15 open the web leaderboard via the Steam overlay
// instead of the built-in HTML MOTD. Falls back to local HTML when disabled (0).
bhop_motd_web_enabled "0"
bhop_motd_web_url "http://YOUR_SERVER_ADDRESS/pro15.php"

// Anti-cheat
bhop_anticheat_autobhop "1"
bhop_anticheat_sync_limit "98"
bhop_anticheat_strafehack "1"
bhop_anticheat_air_stuck "1"

// Enhanced spectator HUD
bhop_spec_hud_enhanced "1"
bhop_spec_hud_show_keys "1"
bhop_spec_hud_show_sync "1"
bhop_spec_hud_show_wr "1"

// Bhop server physics
bhop_apply_server_cvars "1"
bhop_sv_airaccelerate "999999999"
bhop_sv_maxspeed "250"
bhop_sv_maxvelocity "40000"
bhop_sv_accelerate "999999999"
bhop_sv_friction "0"
bhop_sv_stopspeed "0"
bhop_sv_airmove "1"
bhop_edgefriction "0"
bhop_mp_freezetime "0"
bhop_mp_roundtime "9"
